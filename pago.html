<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css" type="text/css">
    <link rel="shortcut icon" href="images/logo.jpeg" type="image/x-icon">
    <title>Finalizar Pedido | La Hormiga</title>
</head>
<body>
<main class="container">
    <div class="pago-container">
        <h2>💳 Finalizar Compra</h2>
        <div id="resumen-pago" class="total-pago">Total: 0.00 €</div>

        <form id="form-pago" onsubmit="procesarPedidoReal(event)">
            <div class="form-group">
                <label>Nombre y Apellidos</label>
                <input type="text" id="nombre-cliente" required>
            </div>
            <div class="form-group">
                <label>Dirección en La Algaba (Calle y Número)</label>
                <input type="text" id="direccion-cliente" required>
            </div>

            <h3>Método de Pago</h3>

            <div class="metodos-pago">

                <div class="metodo-box">
                    <label>
                        <input type="radio" name="pago" value="tarjeta" onclick="mostrarDetalles('detalles-tarjeta')" checked>
                        <span>💳 Tarjeta de Crédito/Débito</span>
                    </label>
                    <div id="detalles-tarjeta" class="detalles-metodo active">
                        <p><small>Serás redirigido a la pasarela segura de Stripe.</small></p>
                        <input type="text" placeholder="Nombre en la tarjeta">
                    </div>
                </div>

                <div class="metodo-box">
                    <label>
                        <input type="radio" name="pago" value="bizum" onclick="mostrarDetalles('detalles-bizum')">
                        <span>📲 Bizum</span>
                    </label>
                    <div id="detalles-bizum" class="detalles-metodo">
                        <p>Introduce el número de teléfono asociado a tu Bizum:</p>
                        <input type="text" id="telefono-bizum" placeholder="600 000 000" maxlength="9">
                    </div>
                </div>

                <div class="metodo-box">
                    <label>
                        <input type="radio" name="pago" value="paypal" onclick="mostrarDetalles('detalles-paypal')">
                        <span>🅿️ PayPal</span>
                    </label>
                    <div id="detalles-paypal" class="detalles-metodo">
                        <p><small>Paga de forma segura con tu cuenta de PayPal.</small></p>
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-comprar" style="margin-top: 20px;">Confirmar Pedido</button>
        </form>
    </div>

    <a href="index.html" class="btn-volver">← Volver a la tienda</a>
</main>

<script src="stylesheet.js"></script>
</body>
</html>
