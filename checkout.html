<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagenes/logo.png" type="image/x-icon">
    <script src="script.js"></script>
    <title>Kiosko La Hormiga - Finalizar Pedido</title>
    <style>
        :root {
            --azul: #0076bd;
            --rosa: #ff66b2;
            --rojo: #ff4d4d;
            --amarillo: #ffcc00;
            --blanco: #ffffff;
            --gris-oscuro: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: var(--gris-oscuro);
        }

        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: var(--blanco);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h2 {
            color: var(--azul);
            text-align: center;
            margin-bottom: 25px;
        }

        .resumen-total {
            background-color: #e6f3ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--azul);
            margin-bottom: 25px;
            border: 1px solid #b3d7ff;
        }

        .grupo-formulario {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="email"], input[type="tel"], select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus, select:focus {
            border-color: var(--azul);
            outline: none;
        }

        .checkbox-factura {
            flex-direction: row;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            cursor: pointer;
        }

        #seccion-facturacion {
            display: none;
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .metodos-pago {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .opcion-pago {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .opcion-pago input {
            margin: 0;
            transform: scale(1.2);
        }

        .opcion-pago:hover {
            border-color: var(--rosa);
            background-color: #fff0f7;
        }

        .btn-confirmar {
            background-color: var(--rojo);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background 0.2s;
        }

        .btn-confirmar:hover {
            background-color: var(--azul);
        }

        .btn-volver {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<main>
    <h2>Finalizar Pedido</h2>
    
    <div class="resumen-total">
        Total a pagar: <span id="checkout-total">0.00€</span>
    </div>

    <form id="form-pedido">
        <div class="grupo-formulario">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" required placeholder="Tu nombre">
        </div>

        <div class="grupo-formulario">
            <label for="apellidos">Apellidos *</label>
            <input type="text" id="apellidos" required placeholder="Tus apellidos">
        </div>

        <div class="grupo-formulario">
            <label for="telefono">Número de teléfono *</label>
            <input type="tel" id="telefono" required placeholder="Ej: 600123456">
        </div>

        <div class="grupo-formulario">
            <label for="correo">Correo electrónico *</label>
            <input type="email" id="correo" required placeholder="tu@email.com">
        </div>

        <div class="grupo-formulario">
            <label for="direccion">Dirección de envío *</label>
            <input type="text" id="direccion" required placeholder="Calle, número, piso, localidad">
        </div>

        <div class="grupo-formulario checkbox-factura">
            <input type="checkbox" id="requiere-factura">
            <label for="requiere-factura">La dirección de facturación es diferente a la de envío</label>
        </div>

        <div id="seccion-facturacion">
            <div class="grupo-formulario">
                <label for="direccion-factura">Dirección de Facturación</label>
                <input type="text" id="direccion-factura" placeholder="Calle, número, CIF/DNI si aplica">
            </div>
        </div>

        <div class="grupo-formulario" style="margin-top: 20px;">
            <label>Elige la forma de pago *</label>
            <div class="metodos-pago">
                <label class="opcion-pago">
                    <input type="radio" name="pago" value="Tarjeta Bancaria" required> 💳 Tarjeta Bancaria
                </label>
                <label class="opcion-pago">
                    <input type="radio" name="pago" value="PayPal"> 🅿️ PayPal
                </label>
                <label class="opcion-pago">
                    <input type="radio" name="pago" value="Bizum"> 📱 Bizum
                </label>
            </div>
        </div>

        <button type="submit" class="btn-confirmar">Confirmar y Pagar</button>
        <a href="index.html" class="btn-volver">← Volver al Kiosko</a>
    </form>
</main>
</body>
</html>
