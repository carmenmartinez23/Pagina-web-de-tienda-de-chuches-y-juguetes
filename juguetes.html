<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagenes/logo.png" type="image/x-icon">
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Kiosko La Hormiga - Categoría</title>
</head>
<body>

<div id="contenedor-header"></div>

<header class="hero categoria-banner">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1>Juguetes</h1>
    </div>
</header>

<main>
    <div id="loading" class="loading">Buscando productos de esta sección...</div>
    <div class="grid-productos" id="contenedor-productos"></div>
    <div class="modal-especificaciones" id="modal-producto">
    <div class="modal-contenido">
        <button class="modal-cerrar" id="cerrar-modal">✕</button>
        <div class="modal-cuerpo">
            <img src="" alt="" class="modal-img" id="modal-img-destino">
            <div class="modal-detalles">
                <span class="producto-categoria" id="modal-cat-destino">CATEGORÍA</span>
                <h3 id="modal-nom-destino">Nombre del Producto</h3>
                <span class="producto-precio" id="modal-pre-destino">0.00€</span>

                <div class="modal-desc-titulo">
                    Especificaciones del producto:
                </div>

                <p class="modal-txt-especificaciones" id="modal-desc-destino">
                    Aquí se cargarán los detalles.
                </p>
            </div>
        </div>
    </div>
</div>
</main>

<footer>
    <p>&copy; 2026 Kiosko La Hormiga de La Algaba</p>
</footer>

</body>
</html>
